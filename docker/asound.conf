# Route ALSA's default PCM/CTL through PulseAudio. Inside the docker
# container we don't run our own sound server; we proxy to the host's
# PulseAudio (or PipeWire's pulse-compat) via the socket bind-mounted by
# docker-compose at /run/user/$UID/pulse/native. This makes ALSA's "default"
# device honor the host's selected input/output (Pop_OS sound settings).
#
# If the pulse socket isn't available, fall back to ALSA's sysdefault so
# the container still works in non-desktop contexts (CI, headless boots).
pcm.!default {
    type pulse
    fallback "sysdefault"
    hint {
        show on
        description "Container default → host PulseAudio/PipeWire"
    }
}

ctl.!default {
    type pulse
    fallback "sysdefault"
}
